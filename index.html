<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Botanical Particle Universe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030105; font-family: 'Inter', sans-serif; color: white; }
        canvas { display: block; }
        .glass {
            background: rgba(10, 5, 15, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(168, 85, 247, 0.1);
            border-radius: 28px;
        }
        #video-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 140px;
            height: 105px;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 20px;
            transform: scaleX(-1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        #video-container video { width: 100%; height: 100%; object-fit: cover; }
        .btn-active {
            background: linear-gradient(135deg, #7e22ce, #4c1d95);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .purple-glow {
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.7);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-purple-900 border-t-purple-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] tracking-[0.4em] uppercase text-purple-400 animate-pulse font-bold">Initializing Heart & Rose Canvas...</p>
    </div>

    <!-- UI Overlay -->
    <div class="fixed top-8 left-8 z-10 space-y-6">
        <div class="glass p-8 w-80 shadow-2xl">
            <h1 class="text-2xl font-black mb-1 tracking-tighter text-white purple-glow">PARTICLE ART</h1>
            <p class="text-[9px] opacity-40 mb-6 uppercase tracking-[0.3em] font-bold">Deep Purple Rose & Heart</p>

            <div class="space-y-6">
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                    <label class="text-[9px] uppercase tracking-widest font-black opacity-30 block mb-4">Cử chỉ điều khiển</label>
                    <div class="space-y-3 text-xs">
                        <div class="flex justify-between items-center"><span class="opacity-60">🖐️ 4-5 ngón</span> <span class="text-purple-400 font-bold uppercase">Hoa Tím</span></div>
                        <div class="flex justify-between items-center"><span class="opacity-60">✌️ 2 ngón</span> <span class="text-pink-400 font-bold uppercase">Trái Tim</span></div>
                        <div class="flex justify-between items-center"><span class="opacity-60">✊ Nắm tay</span> <span class="text-blue-400 font-bold uppercase">Thiên hà</span></div>
                        <div class="flex justify-between items-center"><span class="opacity-60">👌 OK Sign</span> <span class="text-amber-400 font-bold uppercase">Thổ Tinh</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3" id="shape-selector">
                    <button id="btn-rose" onclick="setShape('rose')" class="btn-active border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Floral</button>
                    <button id="btn-heart" onclick="setShape('heart')" class="border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Heart</button>
                    <button id="btn-solar" onclick="setShape('solar')" class="border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Galaxy</button>
                    <button id="btn-saturn" onclick="setShape('saturn')" class="border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Saturn</button>
                </div>

                <div class="flex items-center gap-2 pt-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="status-badge" class="text-[9px] uppercase tracking-widest font-bold text-white/30">Camera Standby</span>
                </div>
            </div>
        </div>
    </div>

    <div id="video-container"><video id="input-video"></video></div>

    <script>
        const PARTICLE_COUNT = 40000; 
        let currentShape = 'rose';
        let handExpansion = 1.0;
        let targetExpansion = 1.0;
        let rotationSpeed = 0.001;
        let heartPulse = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        camera.position.z = 12;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        function generatePurpleBotanical() {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            const col = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (i < 25000) {
                    const t = (i / 25000);
                    const phi = i * 137.5 * (Math.PI / 180);
                    const rBase = Math.sqrt(t) * 3.8;
                    const r = rBase + Math.sin(phi * 6) * 0.15 * t;
                    pos[i * 3] = Math.cos(phi) * r;
                    pos[i * 3 + 1] = Math.sin(phi) * r + 2.0; 
                    pos[i * 3 + 2] = Math.sin(t * Math.PI) * 0.8;
                    if (Math.random() > 0.97) {
                        col[i * 3] = 0.9; col[i * 3 + 1] = 0.9; col[i * 3 + 2] = 1.0;
                    } else {
                        col[i * 3] = 0.3 + t * 0.4; col[i * 3 + 1] = 0.05 + t * 0.1; col[i * 3 + 2] = 0.5 + t * 0.5;
                    }
                } else if (i < 32000) {
                    const tStem = (i - 25000) / 7000;
                    const yStem = 2.0 - tStem * 8.0;
                    const xStem = Math.sin(yStem * 0.4) * 0.5;
                    pos[i * 3] = xStem + (Math.random() - 0.5) * 0.15;
                    pos[i * 3 + 1] = yStem;
                    pos[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    col[i * 3] = 0.05; col[i * 3 + 1] = 0.35; col[i * 3 + 2] = 0.1;
                } else {
                    const tLeaf = (i - 32000) / 8000;
                    const side = tLeaf < 0.5 ? 1 : -1;
                    const progress = (tLeaf % 0.5) * 2;
                    const angleLeaf = progress * Math.PI;
                    const rLeaf = Math.sin(angleLeaf) * 1.8;
                    const yBase = -1.0 - (side === 1 ? 0 : 2.5);
                    pos[i * 3] = side * (rLeaf * 0.8 + progress * 1.5);
                    pos[i * 3 + 1] = yBase + Math.cos(angleLeaf) * 0.6;
                    pos[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    col[i * 3] = 0.1; col[i * 3 + 1] = 0.5; col[i * 3 + 2] = 0.15;
                }
            }
            return { pos, col };
        }

        function generateHeart() {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            const col = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random());
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                pos[i * 3] = (x / 5) * r; 
                pos[i * 3 + 1] = (y / 5) * r; 
                pos[i * 3 + 2] = (Math.random() - 0.5) * 1.5;
                // Màu hồng tím lấp lánh
                col[i * 3] = 0.8 + Math.random() * 0.2; 
                col[i * 3 + 1] = 0.1; 
                col[i * 3 + 2] = 0.6 + Math.random() * 0.4;
            }
            return { pos, col };
        }

        function generateSaturn() {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            const col = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (i < PARTICLE_COUNT * 0.5) {
                    const u = Math.random(); const v = Math.random();
                    const theta = 2 * Math.PI * u; const phi = Math.acos(2 * v - 1);
                    const r = 2.5;
                    pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    pos[i * 3 + 2] = r * Math.cos(phi);
                    col[i * 3] = 0.8; col[i * 3 + 1] = 0.6; col[i * 3 + 2] = 0.3;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 3.5 + Math.random() * 2.5;
                    pos[i * 3] = Math.cos(angle) * r;
                    pos[i * 3 + 1] = (Math.random() - 0.5) * 0.3;
                    pos[i * 3 + 2] = Math.sin(angle) * r;
                    col[i * 3] = 0.6; col[i * 3 + 1] = 0.5; col[i * 3 + 2] = 0.4;
                }
            }
            return { pos, col };
        }

        function generateSolarGalaxy() {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            const col = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 1.5) * 9.0;
                const spiral = r * 1.5;
                pos[i * 3] = Math.cos(angle + spiral) * r;
                pos[i * 3 + 1] = Math.sin(angle + spiral) * r;
                pos[i * 3 + 2] = (Math.random() - 0.5) * 2.5;
                if(r < 2) { col[i * 3] = 1.0; col[i * 3 + 1] = 0.8; col[i * 3 + 2] = 0.2; }
                else { col[i * 3] = 0.2; col[i * 3 + 1] = 0.4; col[i * 3 + 2] = 1.0; }
            }
            return { pos, col };
        }

        let floralData = generatePurpleBotanical();
        let currentTargetPos = floralData.pos;

        function setShape(shape) {
            if (currentShape === shape) return;
            currentShape = shape;
            document.querySelectorAll('#shape-selector button').forEach(b => b.classList.remove('btn-active'));
            document.getElementById(`btn-${shape}`).classList.add('btn-active');

            let data;
            if(shape === 'rose') data = generatePurpleBotanical();
            else if(shape === 'solar') data = generateSolarGalaxy();
            else if(shape === 'saturn') data = generateSaturn();
            else if(shape === 'heart') data = generateHeart();

            currentTargetPos = data.pos;
            updateColors(data.col);
            rotationSpeed = (shape === 'rose' || shape === 'heart') ? 0.001 : 0.003;
        }

        function updateColors(colArray) {
            const colAttr = geometry.attributes.color;
            for(let i=0; i<PARTICLE_COUNT*3; i++) colAttr.array[i] = colArray[i];
            colAttr.needsUpdate = true;
        }

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        hands.onResults((res) => {
            if (res.multiHandLandmarks?.length > 0) {
                document.getElementById('status-badge').innerText = 'STABLE';
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
                
                const marks = res.multiHandLandmarks[0];
                let fingers = 0;
                if(marks[8].y < marks[5].y) fingers++;
                if(marks[12].y < marks[9].y) fingers++;
                if(marks[16].y < marks[13].y) fingers++;
                if(marks[20].y < marks[17].y) fingers++;

                const dThumbIndex = Math.hypot(marks[4].x - marks[8].x, marks[4].y - marks[8].y);
                
                if (dThumbIndex < 0.05 && fingers >= 3) setShape('saturn');
                else if (fingers === 0) setShape('solar');
                else if (fingers === 2) setShape('heart'); // Đã đổi sang 2 ngón (✌️) cho dễ nhận diện
                else if (fingers >= 4) setShape('rose');
                
                targetExpansion = THREE.MathUtils.mapLinear(dThumbIndex, 0.05, 0.4, 0.8, 3.0);
            } else {
                document.getElementById('status-badge').innerText = 'SEARCHING';
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-red-500';
                targetExpansion = 1.0;
            }
        });

        const videoElement = document.getElementById('input-video');
        const cameraTracker = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        cameraTracker.start().then(() => {
            document.getElementById('loading-overlay').style.display = 'none';
            updateColors(floralData.col);
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Heart Pulse effect
            heartPulse = Math.sin(Date.now() * 0.005) * 0.05;
            const currentPulse = (currentShape === 'heart') ? (1 + heartPulse) : 1;
            
            handExpansion += (targetExpansion - handExpansion) * 0.1;
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                posAttr.array[i*3] += (currentTargetPos[i*3]*handExpansion*currentPulse - posAttr.array[i*3]) * 0.06;
                posAttr.array[i*3+1] += (currentTargetPos[i*3+1]*handExpansion*currentPulse - posAttr.array[i*3+1]) * 0.06;
                posAttr.array[i*3+2] += (currentTargetPos[i*3+2]*handExpansion*currentPulse - posAttr.array[i*3+2]) * 0.06;
            }
            posAttr.needsUpdate = true;
            points.rotation.y += rotationSpeed;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
